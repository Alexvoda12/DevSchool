<!-- templates/nav.html -->
<nav class="navbar">
    <div class="container nav-wrapper">
        <div class="logo">
            <i class="fa-brands fa-python logo-icon"></i>
            <span class="logo-text">PyMaster</span>
        </div>
        <div class="nav-links">
            <a href="{{ url_for('main') }}" class="{% if request.endpoint == 'main' %}active{% endif %}">Главная</a>
            <a href="{{ url_for('courses') }}" class="{% if request.endpoint == 'courses' %}active{% endif %}">Курсы</a>
            <a href="{{ url_for('tasks') }}" class="{% if request.endpoint == 'tasks' %}active{% endif %}">Задачи</a>
            <a href="{{ url_for('textbooks') }}" class="{% if request.endpoint == 'textbooks' %}active{% endif %}">Учебники</a>
            <a href="{{ url_for('ai_assistant') }}" class="{% if request.endpoint == 'ai_assistant' %}active{% endif %}">GPT-4</a>
            <a href="{{ url_for('dashboard') }}" class="{% if request.endpoint == 'dashboard' %}active{% endif %}">Кабинет</a>
            <a href="{{ url_for('about') }}" class="{% if request.endpoint == 'about' %}active{% endif %}">О нас</a>
            
            <div class="pyth-balance" onclick="window.location.href='{{ url_for('shop') }}'">
                <i class="fa-solid fa-coins"></i>
                <span>{{ session.user.balance if session.user else 0 }} PYTH</span>
            </div>
            
            {% if session.user %}
                <a href="{{ url_for('logout') }}" class="logout-btn">
                    <i class="fa-solid fa-arrow-right-from-bracket"></i>
                </a>
            {% else %}
                <a href="{{ url_for('login') }}" class="login-btn">Войти</a>
            {% endif %}
        </div>
    </div>
</nav>
